{% extends "base.html" %}

{% block title %}
회원가입
{% endblock %}

{% block content %}

<section class="page-title">
  <h2>회원가입</h2>
  <p>회원가입 후 나만의 레시피를 등록할 수 있습니다.</p>
</section>

{% if error %}
<p class="error-message">{{ error }}</p>
{% endif %}

<form method="POST" action="{{ url_for('register') }}" class="recipe-form">

  <label for="username">이름</label>
  <input type="text"
         id="username"
         name="username"
         placeholder="예: 홍길동"
         required>

  <label for="email">이메일</label>
  <input type="email"
         id="email"
         name="email"
         placeholder="예: user@example.com"
         required>

  <label for="password">비밀번호</label>
  <input type="password"
         id="password"
         name="password"
         required>

  <label for="password_check">비밀번호 확인</label>
  <input type="password"
         id="password_check"
         name="password_check"
         required>

  <div class="form-buttons">
    <button type="submit" class="btn">완료</button>
    <a href="{{ url_for('login') }}" class="btn cancel">로그인으로</a>
  </div>

</form>

{% endblock %}
