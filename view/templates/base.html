<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}레시피 관리{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>모두의 냉장고 레시피</h1>

    <nav>
        <a href="{{ url_for('index') }}">레시피 목록</a>

        {% if session.get("user_id") %}
        <a href="{{ url_for('add_recipe') }}">레시피 추가</a>
        <a href="{{ url_for('my_recipes') }}">내 레시피</a>

        {% if session.get("role") == "admin" %}
        <a href="{{ url_for('admin_page') }}">관리자 페이지</a>
        <a href="{{ url_for('admin_reports') }}">신고 목록</a>
        {% endif %}

        <span class="login-user">
                {{ session.get("username") }}님
            </span>

        <a href="{{ url_for('logout') }}">로그아웃</a>
        {% else %}
        <a href="{{ url_for('login') }}">로그인</a>
        <a href="{{ url_for('register') }}">회원가입</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
</footer>

</body>
</html>
