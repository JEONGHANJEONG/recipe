{% extends "base.html" %}

{% block title %}
로그인
{% endblock %}

{% block content %}

<section class="page-title">
  <h2>로그인</h2>
  <p>로그인 후 레시피를 등록할 수 있습니다.</p>
</section>

{% if error %}
<p class="error-message">{{ error }}</p>
{% endif %}

<form method="POST" action="{{ url_for('login') }}" class="recipe-form">

  <label for="email">이메일</label>
  <input type="email"
         id="email"
         name="email"
         placeholder="예: user@example.com"
         required>

  <label for="password">비밀번호</label>
  <input type="password"
         id="password"
         name="password"
         required>

  <div class="form-buttons">
    <button type="submit" class="btn">로그인</button>
    <a href="{{ url_for('register') }}" class="btn cancel">회원가입</a>
  </div>

</form>

{% endblock %}
