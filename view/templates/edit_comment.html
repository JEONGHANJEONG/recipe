{% extends "base.html" %}

{% block title %}
댓글 수정
{% endblock %}

{% block content %}

<section class="page-title">
    <h2>댓글 수정</h2>
    <p>작성한 댓글 내용을 수정합니다.</p>
</section>

<form method="POST"
      action="{{ url_for('edit_comment', comment_id=comment[0]) }}"
      class="recipe-form">

    <label for="content">댓글 내용</label>

    <textarea id="content"
              name="content"
              rows="6"
              required>{{ comment[3] }}</textarea>

    <div class="form-buttons">
        <button type="submit" class="btn">수정 완료</button>
        <a href="{{ url_for('detail_recipe', id=comment[1]) }}" class="btn cancel">
            취소
        </a>
    </div>

</form>

{% endblock %}
